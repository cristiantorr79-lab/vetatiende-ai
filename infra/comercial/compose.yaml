name: vetatiende-comercial

services:
  caddy:
    image: caddy:2.11.4
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - vetatiende
    depends_on:
      - n8n
      - streamlit
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:2.29.8
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      TZ: America/Santiago
      GENERIC_TIMEZONE: America/Santiago
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOST}/
      N8N_PROXY_HOPS: "1"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "10000"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_NATIVE_PYTHON_RUNNER: "true"
      N8N_RUNNERS_MAX_CONCURRENCY: "1"
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/rag:/home/node/.n8n-files/data:ro
    networks:
      - vetatiende
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  task-runners:
    image: n8nio/runners:2.29.8
    restart: unless-stopped
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_MAX_CONCURRENCY: "1"
      GENERIC_TIMEZONE: America/Santiago
    networks:
      - vetatiende
    depends_on:
      n8n:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      CLINIC_ID: ${CLINIC_ID}
      N8N_PUBLIC_WEBHOOK_URL: ${N8N_PUBLIC_WEBHOOK_URL}
      N8N_INTERNAL_WEBHOOK_URL: ${N8N_INTERNAL_WEBHOOK_URL}
      VETATIENDE_INTERNAL_KEY: ${VETATIENDE_INTERNAL_KEY}
    networks:
      - vetatiende
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vetatiende:
    driver: bridge
