services:
  n8n:
    image: n8nio/n8n:latest
    container_name: vetatiende-n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Santiago
      - TZ=America/Santiago
    volumes:
      - ./n8n:/home/node/.n8n
      - ./data:/home/node/.n8n-files/data
    restart: unless-stopped


